<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>One Million Café | Official Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #121212; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; scroll-behavior: smooth; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; padding-bottom: 100px; }
        
        header { padding: 30px; text-align: center; background: #000; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 2rem; font-weight: 900; color: var(--gold); }

        /* شريط التنقل السريع */
        .quick-nav { display: flex; overflow-x: auto; background: #111; padding: 10px; sticky; top: 85px; z-index: 999; gap: 10px; border-bottom: 1px solid #222; }
        .quick-nav a { white-space: nowrap; background: #222; color: #fff; padding: 8px 15px; border-radius: 20px; text-decoration: none; font-size: 0.9rem; border: 1px solid #333; }
        .quick-nav a:active { background: var(--gold); color: #000; }

        /* الأقسام */
        .section-title { padding: 20px; background: rgba(212, 175, 55, 0.1); color: var(--gold); font-size: 1.5rem; font-weight: 900; border-right: 5px solid var(--gold); margin: 20px 0 10px; }
        .items-container { padding: 0 15px; }
        
        .item-card { 
            background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid #222;
        }
        .item-info b { display: block; font-size: 1.1rem; color: #fff; }
        .item-info span { color: var(--gold); font-weight: 900; }
        .add-btn { background: var(--gold); color: #000; border: none; padding: 10px 20px; border-radius: 10px; font-weight: 900; cursor: pointer; }

        /* زر السلة والبيانات */
        .cart-footer { position: fixed; bottom: 0; width: 100%; background: var(--gold); color: #000; padding: 20px; text-align: center; font-weight: 900; font-size: 1.2rem; z-index: 2000; display: none; }
        
        /* مودال البيانات */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 9999; padding: 20px; }
        .modal-box { background: #1a1a1a; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; border: 1px solid var(--gold); }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; text-align: center; }

        /* سجل الطلبات */
        .history-btn { position: fixed; bottom: 80px; left: 20px; background: #222; color: var(--gold); padding: 10px 20px; border-radius: 50px; border: 1px solid var(--gold); z-index: 1000; font-weight: bold; }
        #history-view { position: fixed; inset: 0; background: #000; z-index: 3000; display: none; padding: 20px; overflow-y: auto; }
    </style>
</head>
<body>

<header><div class="logo">ONE MILLION</div></header>

<div class="quick-nav">
    <a href="#HOT">HOT DRINKS</a>
    <a href="#ICED">ICED DRINKS</a>
    <a href="#ARABIC">القهوة العربية</a>
    <a href="#MATCHA">MATCHA</a>
    <a href="#DESSERTS">DESSERTS</a>
    <a href="#CROISSANT">CROISSANT</a>
    <a href="#SODA">MOJITO</a>
</div>

<div id="menu-content"></div>

<button class="history-btn" onclick="toggleHistory(true)">طلباتي السابقة 📋</button>

<div id="history-view">
    <button onclick="toggleHistory(false)" style="color:var(--gold); background:none; border:none; margin-bottom:20px; font-weight:bold;">← إغلاق السجل</button>
    <div id="history-list"></div>
</div>

<div class="cart-footer" id="cart-bar" onclick="openOrderModal()">تأكيد الطلب (<span id="cart-qty">0</span>)</div>

<div class="modal" id="order-modal">
    <div class="modal-box">
        <h2 style="color:var(--gold); text-align:center;">بيانات الأوردر</h2>
        <input type="text" id="cust-name" placeholder="اسمك">
        <input type="number" id="cust-table" placeholder="رقم الطاولة">
        <button onclick="submitOrder()" style="width:100%; background:var(--gold); padding:15px; border:none; border-radius:10px; font-weight:900; margin-top:10px;">إرسال للبار 🚀</button>
        <button onclick="closeModal()" style="width:100%; background:none; border:none; color:gray; margin-top:10px;">رجوع</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://crebyway-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const menu = {
        "HOT": [
            {n:"Espresso", p:50}, {n:"Double Espresso", p:65}, {n:"Americano", p:55}, {n:"Macchiato", p:60}, {n:"Cortado", p:70}, 
            {n:"Flat White", p:80}, {n:"Cappuccino (L)", p:95}, {n:"Latte (L)", p:90}, {n:"Mocha (L)", p:100},
            {n:"Spanish Latte (L)", p:110}, {n:"V60 (Hot)", p:120}, {n:"Turkish Coffee (S)", p:40}, {n:"Turkish Coffee (D)", p:55}
        ],
        "ICED": [
            {n:"Iced Americano", p:70}, {n:"Iced Latte", p:95}, {n:"Iced Spanish Latte", p:110}, 
            {n:"Iced Mocha", p:110}, {n:"Iced White Mocha", p:100}, {n:"V60 (Iced)", p:120}
        ],
        "ARABIC": [
            {n:"دلة قهوة سعودي (S)", p:20}, {n:"دلة قهوة سعودي (L)", p:35}, {n:"دلة كرك (S)", p:25}, {n:"دلة كرك (L)", p:40},
            {n:"شاي إنجليزي", p:15}, {n:"شاي أخضر", p:15}, {n:"شاي بالنعناع", p:20}, {n:"حليب زنجبيل", p:20}
        ],
        "MATCHA": [
            {n:"Matcha Classic", p:100}, {n:"Matcha Mango", p:120}, {n:"Matcha Strawberry", p:120}, {n:"Matcha Cherry", p:120}
        ],
        "DESSERTS": [
            {n:"Mango Cheesecake", p:85}, {n:"Pistachio Cheesecake", p:90}, {n:"San Sebastian", p:95}, {n:"Red Velvet", p:85}
        ],
        "CROISSANT": [
            {n:"Plain Croissant", p:60}, {n:"Almond Croissant", p:85}, {n:"Pistachio Croissant", p:85}, {n:"Chocolate Croissant", p:75}
        ],
        "SODA": [
            {n:"Mojito Classic", p:75}, {n:"Strawberry Mojito", p:85}, {n:"Blue Lagoon Soda", p:85}, {n:"Passion Fruit Soda", p:90}
        ]
    };

    let cart = [];

    // بناء المنيو تحت بعضه
    const content = document.getElementById('menu-content');
    for (let section in menu) {
        let sectionHtml = `<div class="section-title" id="${section}">${section}</div><div class="items-container">`;
        menu[section].forEach(item => {
            sectionHtml += `
                <div class="item-card">
                    <div class="item-info"><b>${item.n}</b><span>${item.p} EGP</span></div>
                    <button class="add-btn" onclick="addToCart('${item.n}', ${item.p})">Add +</button>
                </div>`;
        });
        sectionHtml += `</div>`;
        content.innerHTML += sectionHtml;
    }

    function addToCart(n, p) {
        cart.push({n, p});
        document.getElementById('cart-bar').style.display = 'block';
        document.getElementById('cart-qty').innerText = cart.length;
    }

    function openOrderModal() { document.getElementById('order-modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('order-modal').style.display = 'none'; }

    function submitOrder() {
        const name = document.getElementById('cust-name').value;
        const table = document.getElementById('cust-table').value;
        if(!name || !table) return alert("الاسم والتربيزة يا بطل!");

        const order = { customer: name, table: table, items: cart, total: cart.reduce((a,b)=>a+b.p,0), status: "قيد الانتظار ⏳", time: new Date().toLocaleString('ar-EG') };
        const ref = db.ref('orders').push();
        ref.set(order).then(() => {
            let history = JSON.parse(localStorage.getItem('my_orders_million') || "[]");
            history.push(ref.key);
            localStorage.setItem('my_orders_million', JSON.stringify(history));
            cart = []; document.getElementById('cart-bar').style.display = 'none';
            closeModal(); alert("أوردرك وصل للبار! 🚀");
        });
    }

    function toggleHistory(show) {
        document.getElementById('history-view').style.display = show ? 'block' : 'none';
        if(show) renderHistory();
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        list.innerHTML = '';
        const history = JSON.parse(localStorage.getItem('my_orders_million') || "[]");
        history.reverse().forEach(id => {
            db.ref('orders/' + id).on('value', snap => {
                const o = snap.val(); if(!o) return;
                list.innerHTML += `<div style="background:#111; padding:15px; border-radius:12px; margin-bottom:10px; border-right:4px solid var(--gold);">
                    <b style="color:var(--gold);">${o.status}</b><br>
                    مجموع: ${o.total} EGP<br><small>${o.time}</small>
                </div>`;
            });
        });
    }
</script>
</body>
</html>
