<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>One Million Café | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; 
            touch-action: pan-y; -webkit-user-select: none; user-select: none; }
        
        body { background: var(--bg); color: #fff; overflow-x: hidden; padding-bottom: 120px; }
        
        /* الهيدر */
        header { padding: 40px 20px; text-align: center; border-bottom: 1px solid var(--gold); background: #000; }
        .logo { font-size: 2.5rem; font-weight: 900; color: var(--gold); letter-spacing: 3px; text-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }

        /* شريط التنقل */
        .nav-bar { display: flex; background: #111; border-bottom: 1px solid #222; }
        .nav-item { flex: 1; padding: 15px; text-align: center; color: #888; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--gold); border-bottom: 2px solid var(--gold); background: rgba(212, 175, 55, 0.05); }

        /* الأقسام (المستطيلات الكبيرة بالصور) */
        .categories-container { padding: 20px; display: grid; gap: 20px; }
        .cat-box { 
            height: 160px; border-radius: 20px; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center; 
            border: 1px solid rgba(212, 175, 55, 0.2); transition: 0.3s;
        }
        .cat-box img { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.5; transition: 0.5s; }
        .cat-box:active img { transform: scale(1.1); }
        .cat-box h3 { position: relative; z-index: 2; font-size: 2rem; font-weight: 900; color: #fff; text-shadow: 2px 2px 10px #000; }

        /* شكل الطلبات الجديد (Premium Look) */
        #menuView { display: none; padding: 20px; }
        .product-item { 
            background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);
        }
        .product-item .info b { font-size: 1.3rem; color: #fff; display: block; text-align: left; }
        .product-item .info span { color: var(--gold); font-weight: 900; font-size: 1.1rem; }
        .add-btn { background: var(--gold); color: #000; border: none; padding: 12px 25px; border-radius: 15px; font-weight: 900; box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2); }

        /* سجل الطلبات */
        .order-history-card { background: #111; border: 1px solid #222; border-radius: 15px; padding: 15px; margin-bottom: 10px; }
        .status-badge { padding: 5px 15px; border-radius: 10px; font-size: 0.8rem; font-weight: bold; margin-bottom: 10px; display: inline-block; }

        /* السلة والرسائل */
        .cart-footer { position: fixed; bottom: 0; width: 100%; background: var(--gold); color: #000; padding: 25px; text-align: center; font-weight: 900; font-size: 1.3rem; border-radius: 30px 30px 0 0; z-index: 2000; }
        #customMsg { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; padding: 15px 35px; border-radius: 50px; font-weight: 900; z-index: 5000; display: none; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body oncontextmenu="return false;"> <div id="customMsg"></div>

<header>
    <div class="logo">ONE MILLION</div>
</header>

<div class="nav-bar">
    <div class="nav-item active" id="navMain" onclick="showTab('main')">MAIN MENU</div>
    <div class="nav-item" id="navHistory" onclick="showTab('history')">MY ORDERS</div>
</div>

<div id="mainView" class="categories-container">
    <div class="cat-box" onclick="openCat('HOT')">
        <img src="https://images.unsplash.com/photo-1541167760496-1628856ab752?q=80&w=600">
        <h3>HOT DRINKS</h3>
    </div>
    <div class="cat-box" onclick="openCat('ICED')">
        <img src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735?q=80&w=600">
        <h3>ICED DRINKS</h3>
    </div>
    <div class="cat-box" onclick="openCat('MATCHA')">
        <img src="https://images.unsplash.com/photo-1594631252845-29fc4586d517?q=80&w=600">
        <h3>MATCHA</h3>
    </div>
    <div class="cat-box" onclick="openCat('DESSERTS')">
        <img src="https://images.unsplash.com/photo-1550617931-e17a7b70dce2?q=80&w=600">
        <h3>DESSERTS</h3>
    </div>
</div>

<div id="menuView">
    <button onclick="showTab('main')" style="background:none; border:1px solid var(--gold); color:var(--gold); padding:5px 20px; border-radius:20px; margin-bottom:20px; font-weight:bold;">← BACK</button>
    <div id="itemsContainer"></div>
</div>

<div id="historyView" style="display:none; padding:20px;">
    <h2 style="color:var(--gold); margin-bottom:20px;">Order History</h2>
    <div id="historyContent"></div>
</div>

<div class="cart-footer" id="cartBar" style="display:none;" onclick="openCheckout()">🛒 VIEW ORDER (<span id="cartCount">0</span>)</div>

<script>
    // Firebase Setup
    const firebaseConfig = { databaseURL: "https://crebyway-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Data
    const menu = {
        "HOT": [{n:"Espresso", p:50}, {n:"Americano", p:55}, {n:"Flat White", p:80}],
        "ICED": [{n:"Iced Latte", p:95}, {n:"Spanish Latte", p:110}],
        "MATCHA": [{n:"Matcha Mango", p:120}],
        "DESSERTS": [{n:"Pistachio Cheesecake", p:90}]
    };

    let cart = [];

    function msg(t) {
        const e = document.getElementById('customMsg'); e.innerText = t; e.style.display = 'block';
        setTimeout(()=>e.style.display='none', 2000);
    }

    // منع الزوم واللمس المتكرر برمجياً
    document.addEventListener('touchstart', (e) => {
        if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });

    function showTab(tab) {
        document.getElementById('mainView').style.display = tab === 'main' ? 'grid' : 'none';
        document.getElementById('historyView').style.display = tab === 'history' ? 'block' : 'none';
        document.getElementById('menuView').style.display = 'none';
        
        document.getElementById('navMain').classList.toggle('active', tab === 'main');
        document.getElementById('navHistory').classList.toggle('active', tab === 'history');
        if(tab === 'history') loadHistory();
    }

    function openCat(c) {
        document.getElementById('mainView').style.display = 'none';
        const view = document.getElementById('menuView'); view.style.display = 'block';
        const container = document.getElementById('itemsContainer');
        container.innerHTML = menu[c].map(i => `
            <div class="product-item">
                <div class="info"><b>${i.n}</b><span>${i.p} EGP</span></div>
                <button class="add-btn" onclick="addToCart('${i.n}', ${i.p})">ADD +</button>
            </div>`).join('');
    }

    function addToCart(n, p) {
        cart.push({n, p});
        document.getElementById('cartBar').style.display = 'block';
        document.getElementById('cartCount').innerText = cart.length;
        msg("Added Successfully ✅");
    }

    function loadHistory() {
        const container = document.getElementById('historyContent');
        container.innerHTML = '<p style="text-align:center; color:#666;">Loading your orders...</p>';
        const myIds = JSON.parse(localStorage.getItem('millionOrders') || "[]");
        
        if(myIds.length === 0) container.innerHTML = '<p style="text-align:center; color:#666;">No orders found.</p>';
        
        myIds.reverse().forEach(id => {
            db.ref('orders/' + id).on('value', snap => {
                const o = snap.val();
                if(!o) return;
                const card = document.createElement('div');
                card.className = 'order-history-card';
                card.innerHTML = `
                    <div class="status-badge" style="background:${o.status.includes('⏳')?'#333':o.status.includes('⚠️')?'#a50044':'#d4af37'}">${o.status}</div>
                    <div style="font-weight:900;">Total: ${o.total} EGP</div>
                    <div style="font-size:0.8rem; color:#888;">Order ID: ${id.slice(-5)}</div>
                    ${o.status.includes('⏳') ? `<button onclick="cancelReq('${id}')" style="margin-top:10px; background:none; border:1px solid #a50044; color:#a50044; padding:5px 15px; border-radius:10px; font-weight:bold;">Request Cancel</button>` : ''}
                `;
                container.appendChild(card);
            });
        });
    }

    function cancelReq(id) {
        db.ref('orders/' + id).update({ status: "طلب إلغاء معلق ⚠️" });
        msg("Cancel Request Sent! ⚠️");
    }

    // إتمام الطلب وحفظ الـ ID في الموبايل
    function openCheckout() {
        const name = prompt("Enter your Name:");
        const table = prompt("Enter Table Number:");
        if(!name || !table) return;

        const order = {
            customer: name, table: table, items: cart,
            total: cart.reduce((s, i) => s + i.p, 0),
            status: "قيد الانتظار ⏳",
            timestamp: firebase.database.ServerValue.TIMESTAMP
        };

        const newRef = db.ref('orders').push();
        newRef.set(order).then(() => {
            let myOrders = JSON.parse(localStorage.getItem('millionOrders') || "[]");
            myOrders.push(newRef.key);
            localStorage.setItem('millionOrders', JSON.stringify(myOrders));
            cart = [];
            document.getElementById('cartBar').style.display = 'none';
            msg("Order Sent Successfully! 🚀");
            showTab('history');
        });
    }
</script>
</body>
</html>
