<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>One Million Café | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #111; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; touch-action: manipulation; -webkit-user-select: none; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; padding-bottom: 120px; }
        
        header { padding: 30px; text-align: center; border-bottom: 2px solid var(--gold); background: #000; }
        .logo { font-size: 2rem; font-weight: 900; color: var(--gold); letter-spacing: 2px; }

        .nav-bar { display: flex; background: #111; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; }
        .nav-item { flex: 1; padding: 15px; text-align: center; color: #888; font-weight: bold; cursor: pointer; }
        .nav-item.active { color: var(--gold); border-bottom: 3px solid var(--gold); background: rgba(212, 175, 55, 0.1); }

        /* الأقسام مع الصور */
        .categories-grid { padding: 20px; display: grid; gap: 15px; }
        .cat-card { 
            height: 130px; border-radius: 20px; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center; border: 1px solid #333;
        }
        .cat-card img { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }
        .cat-card h3 { position: relative; z-index: 2; font-size: 1.8rem; font-weight: 900; color: #fff; text-shadow: 2px 2px 8px #000; }

        /* قائمة المنتجات */
        #menuView { display: none; padding: 20px; }
        .product-card { 
            background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid #222;
        }
        .info b { font-size: 1.1rem; color: #fff; display: block; text-align: left; }
        .info span { color: var(--gold); font-weight: 900; }
        .add-btn { background: var(--gold); color: #000; border: none; padding: 10px 18px; border-radius: 10px; font-weight: 900; }

        /* المودال (نافذة البيانات) */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 3000; padding: 20px; }
        .modal-content { background: #1a1a1a; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; border: 1px solid var(--gold); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; text-align: center; }

        .cart-footer { position: fixed; bottom: 0; width: 100%; background: var(--gold); color: #000; padding: 20px; text-align: center; font-weight: 900; font-size: 1.2rem; z-index: 2000; }
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; padding: 10px 30px; border-radius: 50px; font-weight: bold; z-index: 5000; display: none; }
    </style>
</head>
<body>

<div id="toast"></div>

<header><div class="logo">ONE MILLION</div></header>

<div class="nav-bar">
    <div class="nav-item active" id="btnMain" onclick="tab('main')">MENU</div>
    <div class="nav-item" id="btnHistory" onclick="tab('history')">ORDERS</div>
</div>

<div id="mainView" class="categories-grid">
    <div class="cat-card" onclick="openCat('HOT')"><img src="https://bit.ly/3LzV2yZ"><h3>HOT DRINKS</h3></div>
    <div class="cat-card" onclick="openCat('ICED')"><img src="https://bit.ly/3DsK2W1"><h3>ICED DRINKS</h3></div>
    <div class="cat-card" onclick="openCat('MATCHA')"><img src="https://bit.ly/3BvO7r5"><h3>MATCHA</h3></div>
    <div class="cat-card" onclick="openCat('DESSERTS')"><img src="https://bit.ly/3Rz6A1N"><h3>DESSERTS</h3></div>
    <div class="cat-card" onclick="openCat('CROISSANT')"><img src="https://bit.ly/3S7tW2h"><h3>CROISSANT</h3></div>
    <div class="cat-card" onclick="openCat('SODA')"><img src="https://bit.ly/3Bc8mX6"><h3>ITALIAN SODA</h3></div>
</div>

<div id="menuView">
    <button onclick="tab('main')" style="color:var(--gold); background:none; border:none; margin-bottom:15px; font-weight:bold;">← BACK</button>
    <div id="itemsContainer"></div>
</div>

<div id="historyView" style="display:none; padding:20px;">
    <h2 style="color:var(--gold); margin-bottom:15px;">Order History</h2>
    <div id="historyList"></div>
</div>

<div class="cart-footer" id="cartBar" style="display:none;" onclick="openOrderModal()">🛒 CHECKOUT (<span id="count">0</span>)</div>

<div id="orderModal" class="modal">
    <div class="modal-content">
        <h3 style="text-align:center; color:var(--gold);">Order Details</h3>
        <input type="text" id="custName" placeholder="Your Name">
        <input type="number" id="tabNum" placeholder="Table Number">
        <select id="pMethod" onchange="document.getElementById('wInfo').style.display=this.value==='w'?'block':'none'">
            <option value="c">Cash</option>
            <option value="w">Wallet / محفظة</option>
        </select>
        <div id="wInfo" style="display:none;"><input type="tel" id="senderPh" placeholder="Transfer Phone Number"></div>
        <button onclick="submitOrder()" style="width:100%; background:var(--gold); color:#000; border:none; padding:15px; border-radius:10px; font-weight:900; margin-top:10px;">CONFIRM ORDER</button>
        <button onclick="closeModals()" style="width:100%; background:none; border:none; color:gray; margin-top:10px;">Cancel</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://crebyway-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // المنيو الكامل من الصور
    const menu = {
        "HOT": [{n:"Espresso", p:50}, {n:"Americano", p:55}, {n:"Macchiato", p:60}, {n:"Cortado", p:70}, {n:"Flat White", p:80}, {n:"Cappuccino", p:95}, {n:"Latte", p:90}, {n:"Mocha", p:100}, {n:"White Mocha", p:100}, {n:"Spanish Latte", p:100}, {n:"Hot Chocolate", p:80}, {n:"Turkish Coffee", p:40}, {n:"English Tea", p:25}],
        "ICED": [{n:"Iced Americano", p:70}, {n:"Iced Latte", p:95}, {n:"Iced Spanish Latte", p:110}, {n:"Iced Salted Caramel", p:110}, {n:"Iced Caramel Macchiato", p:100}, {n:"Iced Mocha", p:110}],
        "MATCHA": [{n:"Matcha Classic", p:100}, {n:"Matcha Mango", p:120}, {n:"Matcha Strawberry", p:120}, {n:"Matcha Creme Caramel", p:120}, {n:"Matcha Cherry", p:120}],
        "DESSERTS": [{n:"Mango Cheesecake", p:85}, {n:"Lemon Cheesecake", p:85}, {n:"Apple Cheesecake", p:85}, {n:"Coffee Cheesecake", p:85}, {n:"Pistachio Cheesecake", p:90}, {n:"Red Velvet", p:85}],
        "CROISSANT": [{n:"Plain Croissant", p:60}, {n:"Almond Croissant", p:85}, {n:"Pistachio Croissant", p:85}, {n:"Creme Brulee Danish", p:85}],
        "SODA": [{n:"Mojito Classic", p:75}, {n:"Strawberry Mojito", p:85}, {n:"Pink Lemonade", p:85}, {n:"Blue Lagoon", p:85}, {n:"Passion Fizz", p:90}]
    };

    let cart = [];

    function toast(t) {
        const e = document.getElementById('toast'); e.innerText = t; e.style.display = 'block';
        setTimeout(()=>e.style.display='none', 2500);
    }

    function tab(t) {
        document.getElementById('mainView').style.display = t==='main'?'grid':'none';
        document.getElementById('historyView').style.display = t==='history'?'block':'none';
        document.getElementById('menuView').style.display = 'none';
        document.getElementById('btnMain').className = t==='main'?'nav-item active':'nav-item';
        document.getElementById('btnHistory').className = t==='history'?'nav-item active':'nav-item';
        if(t==='history') loadHistory();
    }

    function openCat(c) {
        document.getElementById('mainView').style.display = 'none';
        document.getElementById('menuView').style.display = 'block';
        const container = document.getElementById('itemsContainer');
        container.innerHTML = menu[c].map(i => `
            <div class="product-card">
                <div class="info"><b>${i.n}</b><span>${i.p} EGP</span></div>
                <button class="add-btn" onclick="addToCart('${i.n}', ${i.p})">ADD</button>
            </div>`).join('');
    }

    function addToCart(n, p) {
        cart.push({n, p});
        document.getElementById('cartBar').style.display = 'block';
        document.getElementById('count').innerText = cart.length;
        toast("Added ✅");
    }

    function openOrderModal() { document.getElementById('orderModal').style.display = 'flex'; }
    function closeModals() { document.getElementById('orderModal').style.display = 'none'; }

    function submitOrder() {
        const name = document.getElementById('custName').value, table = document.getElementById('tabNum').value;
        if(!name || !table) return toast("Missing Info! ⚠️");

        const order = {
            customer: name, table: table, items: cart,
            total: cart.reduce((s,i)=>s+i.p, 0), status: "قيد الانتظار ⏳",
            timestamp: firebase.database.ServerValue.TIMESTAMP
        };

        const ref = db.ref('orders').push();
        ref.set(order).then(() => {
            let ids = JSON.parse(localStorage.getItem('millionIds') || "[]");
            ids.push(ref.key);
            localStorage.setItem('millionIds', JSON.stringify(ids));
            cart = [];
            document.getElementById('cartBar').style.display = 'none';
            closeModals();
            toast("Order Sent! 🚀");
            tab('history');
        });
    }

    function loadHistory() {
        const list = document.getElementById('historyList');
        list.innerHTML = '';
        const ids = JSON.parse(localStorage.getItem('millionIds') || "[]");
        ids.reverse().forEach(id => {
            db.ref('orders/'+id).on('value', s => {
                const o = s.val(); if(!o) return;
                list.innerHTML += `<div style="background:#1a1a1a; padding:15px; border-radius:12px; margin-bottom:10px; border:1px solid #333;">
                    <span style="color:var(--gold); font-weight:bold;">${o.status}</span><br>
                    <b>Total: ${o.total} EGP</b><br>
                    ${o.status.includes('⏳') ? `<button onclick="cancelReq('${id}')" style="color:red; background:none; border:none; margin-top:5px;">Cancel Order</button>` : ''}
                </div>`;
            });
        });
    }

    function cancelReq(id) {
        db.ref('orders/'+id).update({status: "طلب إلغاء معلق ⚠️"});
        toast("Cancel Request Sent! ⚠️");
    }
</script>
</body>
</html>
