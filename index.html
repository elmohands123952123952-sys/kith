<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>One Million Café | Premium System</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #121212; --text: #e0e0e0; }
        
        /* منع الزوم واللمس العشوائي */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: var(--text); overflow-x: hidden; padding-bottom: 100px; }
        
        header { padding: 30px; text-align: center; background: linear-gradient(180deg, #151515 0%, #050505 100%); border-bottom: 1px solid #222; }
        .logo-text { color: var(--gold); font-size: 1.8rem; font-weight: 900; letter-spacing: 2px; }

        /* سجل الطلبات العلوي */
        .top-nav { display: flex; justify-content: space-around; padding: 10px; background: #111; border-bottom: 1px solid var(--gold); }
        .nav-btn { background: none; border: none; color: var(--gold); font-weight: bold; cursor: pointer; font-size: 0.9rem; }

        /* تصميم الأقسام (المستطيلات) */
        .categories-grid { padding: 20px; display: grid; gap: 15px; }
        .cat-item { 
            height: 120px; border-radius: 18px; border: 1px solid #222;
            display: flex; align-items: center; justify-content: center;
            background-size: cover; background-position: center; position: relative; overflow: hidden;
        }
        .cat-item::after { content: ""; position: absolute; inset: 0; background: rgba(0,0,0,0.65); }
        .cat-item h3 { position: relative; z-index: 2; color: #fff; font-size: 1.5rem; letter-spacing: 1px; }

        /* كروت الطلبات المطورة */
        #menuSection { display: none; padding: 20px; animation: slideUp 0.4s ease; }
        .product-card { 
            background: var(--card); border-radius: 15px; padding: 18px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            border-left: 4px solid var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .info b { font-size: 1.1rem; color: #fff; display: block; margin-bottom: 4px; text-align: left; }
        .info span { color: var(--gold); font-weight: 900; font-size: 1rem; }
        .add-btn { background: var(--gold); color: #000; border: none; padding: 10px 20px; border-radius: 10px; font-weight: 900; }

        /* السجل الشخصي */
        #historySection { display: none; padding: 20px; }
        .history-card { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #333; }
        .status-tag { float: left; padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; }

        /* الفاتورة */
        .cart-bar { position: fixed; bottom: 0; width: 100%; background: var(--gold); color: #000; padding: 18px; text-align: center; font-weight: 900; font-size: 1.1rem; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <div class="logo-text">ONE MILLION</div>
    <p style="color: #666; font-size: 0.7rem;">PREMIUM SPECIALTY COFFEE</p>
</header>

<div class="top-nav">
    <button class="nav-btn" onclick="showMain()">🏠 الرئيسية</button>
    <button class="nav-btn" onclick="showHistory()">📜 طلباتي السابقة</button>
</div>

<div id="mainView">
    <div class="categories-grid">
        <div class="cat-item" style="background-image: url('https://bit.ly/3LzV2yZ')" onclick="openMenu('HOT')"><h3>HOT DRINKS</h3></div>
        <div class="cat-item" style="background-image: url('https://bit.ly/3DsK2W1')" onclick="openMenu('ICED')"><h3>ICED DRINKS</h3></div>
        <div class="cat-item" style="background-image: url('https://bit.ly/3BvO7r5')" onclick="openMenu('MATCHA')"><h3>MATCHA</h3></div>
        <div class="cat-item" style="background-image: url('https://bit.ly/3Rz6A1N')" onclick="openMenu('DESSERTS')"><h3>DESSERTS</h3></div>
    </div>
</div>

<div id="menuSection">
    <button onclick="showMain()" style="color:var(--gold); background:none; border:none; margin-bottom:15px;">← العودة للأقسام</button>
    <div id="itemsList"></div>
</div>

<div id="historySection">
    <h2 style="color:var(--gold); margin-bottom:20px;">سجل طلباتك</h2>
    <div id="historyList"></div>
</div>

<div class="cart-bar" id="cartBar" style="display:none;" onclick="showOrderModal()">🛒 تأكيد الأوردر (<span id="count">0</span>)</div>

<script>
    // تكوين Firebase (استخدم بياناتك الحقيقية هنا)
    const firebaseConfig = { databaseURL: "https://crebyway-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const menuData = {
        "HOT": [{n:"Espresso", p:50}, {n:"Americano", p:55}, {n:"Flat White", p:80}],
        "ICED": [{n:"Iced Latte", p:95}, {n:"Spanish Latte", p:110}],
        "MATCHA": [{n:"Matcha Mango", p:120}, {n:"Matcha Strawberry", p:120}],
        "DESSERTS": [{n:"Mango Cheesecake", p:85}, {n:"Red Velvet", p:85}]
    };

    let cart = [];

    function openMenu(cat) {
        document.getElementById('mainView').style.display = 'none';
        document.getElementById('historySection').style.display = 'none';
        document.getElementById('menuSection').style.display = 'block';
        const list = document.getElementById('itemsList');
        list.innerHTML = menuData[cat].map(i => `
            <div class="product-card">
                <div class="info"><b>${i.n}</b><span>${i.p} EGP</span></div>
                <button class="add-btn" onclick="addToCart('${i.n}', ${i.p})">Add</button>
            </div>`).join('');
    }

    function addToCart(n, p) {
        cart.push({n, p, time: new Date().getTime()});
        document.getElementById('cartBar').style.display = 'block';
        document.getElementById('count').innerText = cart.length;
    }

    function showMain() {
        document.getElementById('menuSection').style.display = 'none';
        document.getElementById('historySection').style.display = 'none';
        document.getElementById('mainView').style.display = 'grid';
    }

    // سجل الطلبات المحلي
    function saveOrderToLocal(orderId) {
        let orders = JSON.parse(localStorage.getItem('myOrders') || "[]");
        orders.push(orderId);
        localStorage.setItem('myOrders', JSON.stringify(orders));
    }

    function showHistory() {
        document.getElementById('mainView').style.display = 'none';
        document.getElementById('menuSection').style.display = 'none';
        const historyList = document.getElementById('historyList');
        historyList.innerHTML = '';
        const myIds = JSON.parse(localStorage.getItem('myOrders') || "[]");

        myIds.forEach(id => {
            db.ref('orders/' + id).once('value', s => {
                const o = s.val();
                if(o) {
                    historyList.innerHTML += `
                        <div class="history-card">
                            <span class="status-tag" style="background: ${o.status === 'ملغي' ? 'red' : 'green'}">${o.status}</span>
                            <b>أوردر بقيمة: ${o.total} EGP</b>
                            <p style="font-size:0.8rem; color:gray;">${new Date(o.timestamp).toLocaleString('ar-EG')}</p>
                            ${o.status === 'قيد الانتظار ⏳' ? `<button onclick="requestCancel('${id}')" style="color:red; background:none; border:none; margin-top:10px;">طلب إلغاء</button>` : ''}
                        </div>`;
                }
            });
        });
        document.getElementById('historySection').style.display = 'block';
    }

    function requestCancel(id) {
        if(confirm("هل تريد إرسال طلب إلغاء لصاحب المكان؟")) {
            db.ref('orders/' + id).update({ status: "طلب إلغاء معلق" });
            alert("تم إرسال طلبك، في انتظار موافقة الإدارة.");
            showHistory();
        }
    }
</script>
</body>
</html>
